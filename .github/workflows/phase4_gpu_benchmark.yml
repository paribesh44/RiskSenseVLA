name: phase4-gpu-benchmark

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  benchmark-phase4:
    name: phase4-benchmark-gpu
    runs-on: [self-hosted, gpu]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,open_vocab]"

      - name: Run phase4 benchmark (FPS gate)
        run: |
          python scripts/benchmark_phase4.py \
            --config configs/default.yaml \
            --frames 200 \
            --min-fps 10 \
            --require-gpu \
            --output-json outputs/phase4_benchmark.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase4-benchmark-json
          path: outputs/phase4_benchmark.json
