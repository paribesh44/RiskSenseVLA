runtime:
  target_fps: 25

reproducibility:
  seed: 42

memory:
  use_hazard_weighting: true

hoi:
  use_prediction: true

hazard:
  use_vlm: true

baseline:
  memory_mode: hazard_aware
  hoi_mode: predictive

evaluation:
  occlusion_prob: 0.15
  occlusion_levels: [0.0, 0.2, 0.4, 0.6]

logging:
  jsonl_path: outputs/realtime_ablation_example.jsonl
